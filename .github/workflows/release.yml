name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Build plugin
        run: npm run build

      - name: Package distribution zip
        run: zip custom-note-width.zip main.js manifest.json styles.css

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "$tag" \
            --notes-file <(awk -v ver="$tag" '
              /^## / { if (found) exit; if ($0 ~ "^## "ver) found=1; next }
              found
            ' CHANGELOG.md) \
            main.js manifest.json styles.css custom-note-width.zip
